# Century core pack — rules shared by every cohort dictionary build.
#
# Overlaid by packs/cohorts/<cohort>.yaml. Merge rules:
#   - lists: append (cohort adds to core's list)
#   - scalars: replace
#   - dicts: deep-merge
#
# Anything specific to a single cohort (schema name, per-table recipes,
# concept_name limits) belongs in the cohort pack, not here.

# Tables dropped entirely. PII plumbing, vendor-specific linkage tokens,
# raw ingest echoes with PHI-grade fields, etc.
tables_to_skip:
  - dv_tokenized_profile_data
  # Ingest-side table: raw "gold standard" profile rows that include
  # full date_of_birth, city/state/zip, and free-text admit_diagnosis.
  # HIPAA-identifier-class content; not intended as an analytic source.
  - standard_profile_data_model

# Columns that may sit on otherwise-kept tables but should never appear in a
# published dictionary. Matched by exact column name (case-sensitive).
sensitive_columns:
  - ssn
  - first_name
  - last_name
  - middle_name
  - email
  - phone
  - cellphone
  - address1
  - address2
  - street
  - record_id_tokenized
  - patient_id_tokenized
  - encryption_key
  - file_name
  - s3_uri
  - document_text
  - document_s3_uri

# Regex patterns applied to every column. Anything that matches is plumbing
# (surrogate keys, source-value echoes, audit fields), not a clinical
# variable, so it is skipped before any query runs. Applied in introspect()
# before null-count / top-value queries, so sensitive columns never read.
# There is no "un-drop" list: if a cohort needs one of these kept (e.g.
# visit_concept_id for a downstream join), override the full list in the
# cohort pack. Merge appends, so write the override carefully.
drop_column_patterns:
  - .*_source_concept_id$
  - .*_source_concept_name$
  - .*_source_value$
  - .*_type_concept_id$
  - .*_type_source_value$
  - ^airflow_.*
  - .*_event_id$
  - .*_concept_id$
  - ^provider_id$
  - ^visit_detail_id$
  - ^visit_occurrence_id$
  - ^care_site_id$
  - ^payer_plan_period_id$
  - ^location_id$

# Postgres data types worth computing top-N distributions for during *raw*
# introspection (the --out-xlsx-raw path). Long free-text / narrative types
# are intentionally omitted so note bodies, document URIs, etc. don't leak
# into the summary. If a cohort has legitimate `text`-typed columns worth
# sampling (rare in OMOP - concept_name fields are usually varchar), extend
# this list in that cohort's pack.
sampleable_types:
  - character varying
  - varchar
  - integer
  - bigint
  - smallint
  - numeric
  - real
  - double precision
  - boolean
  - date
