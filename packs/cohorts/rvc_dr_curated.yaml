# Cohort pack: RVC DR
#
# RVC (Retina Vitreous) patients with diabetic retinopathy. Raw dump
# at Output/rvc dr.pdf drove the dr_common + retinal_common packs.

provider: RVC
disease: Diabetic Retinopathy
display_name: RVC DR
cohort_name: rvc_dr_curated
schema_name: rvc_dr_curated
variant: raw
site_group: RVC
status: active

description: >
  RVC patients with diabetic retinopathy — proliferative and non-
  proliferative variants, with and without macular edema. Type 2
  diabetes + hypertension dominate comorbidity; intravitreal
  injections (80.9 % of all procedures) drive therapy utilisation.

notes:
  - Variables pack is `rvc_dr_curated` (per-cohort). Inherits the
    shared retinal_common → dr_common chain; adds no cohort-specific
    overrides — the raw dump's top concepts are all matched by the
    inherited rows.
  - Intravitreal anti-VEGF agents (aflibercept / ranibizumab /
    bevacizumab) don't populate drug_exposure at this site; they
    surface via the Intravitreal Injection procedure row in
    retinal_common. If a future RVC build starts capturing the
    agent name in drug_exposure, add a "Anti-VEGF Agent" row here.

category_rules: {}

variables_pack: rvc_dr_curated
