# Per-column descriptions used to populate Page 3 `Description`.
#
# Keyed by `table.column`. Unknown keys fall back to the column name
# itself. OMOP v5.4 semantics; cohort-specific columns described locally.

columns:
  # --- person ---
  person.person_id:              "Unique patient identifier within the cohort."
  person.gender_concept_id:      "Concept id for patient sex (OMOP standard)."
  person.gender_concept_name:    "Patient biological sex at birth."
  person.year_of_birth:          "Year the patient was born. Used for age calculation."
  person.month_of_birth:         "Month the patient was born, when recorded."
  person.day_of_birth:           "Day of month the patient was born, when recorded."
  person.birth_datetime:         "Full birth timestamp (PII)."
  person.race_concept_id:        "Concept id for patient race."
  person.race_concept_name:      "Self-identified racial category."
  person.ethnicity_concept_id:   "Concept id for patient ethnicity."
  person.ethnicity_concept_name: "Self-identified ethnicity (Hispanic / Not-Hispanic)."
  person.location_id:            "Foreign key to location / ZIP lookup."
  person.provider_id:            "Primary care provider (foreign key)."
  person.care_site_id:           "Primary care site (foreign key)."
  person.person_source_value:    "Source system identifier for the patient (raw)."

  # --- location ---
  location.location_id:           "Primary key for the location row."
  location.address_1:             "Street address line 1 (PII)."
  location.address_2:             "Street address line 2 (PII)."
  location.city:                  "City name (PII)."
  location.state:                 "State / region code."
  location.zip:                   "ZIP code. Three-digit prefix only in most datasets."
  location.county:                "County name."
  location.country_concept_id:    "Country concept id."
  location.country_concept_name:  "Country name."
  location.latitude:              "Geo-coordinate (redact per use case)."
  location.longitude:             "Geo-coordinate (redact per use case)."

  # --- payer_plan_period ---
  payer_plan_period.payer_plan_period_id: "Primary key for a coverage window."
  payer_plan_period.person_id:            "Patient covered by this plan."
  payer_plan_period.payer_concept_name:   "Insurer / payer name."
  payer_plan_period.plan_concept_name:    "Specific plan name under the payer."

  # --- condition_occurrence ---
  condition_occurrence.condition_occurrence_id:   "Primary key for a single diagnosis record."
  condition_occurrence.person_id:                 "Patient the diagnosis belongs to."
  condition_occurrence.condition_concept_id:      "Standard concept id for the condition."
  condition_occurrence.condition_concept_name:    "Human-readable condition name (e.g. 'Alzheimer's disease with late onset')."
  condition_occurrence.condition_start_date:      "First date the condition was recorded."
  condition_occurrence.condition_start_datetime:  "First timestamp the condition was recorded."
  condition_occurrence.condition_end_date:        "End date of the condition, when known."
  condition_occurrence.condition_end_datetime:    "End timestamp of the condition, when known."
  condition_occurrence.condition_type_concept_id: "Concept id for the source (Claim, EHR problem list, etc.)."
  condition_occurrence.condition_type_concept_name: "Source of the diagnosis (Claim, EHR problem list, etc.)."
  condition_occurrence.stop_reason:               "Free-text reason the condition was discontinued."
  condition_occurrence.provider_id:               "Recording clinician."
  condition_occurrence.visit_occurrence_id:       "Encounter the diagnosis was captured in."
  condition_occurrence.visit_detail_id:           "Visit component the diagnosis was captured in."
  condition_occurrence.condition_source_value:    "Original source-system diagnosis code."
  condition_occurrence.condition_source_concept_id: "Source concept id before mapping to standard."
  condition_occurrence.condition_source_concept_name: "Source concept name before mapping."
  condition_occurrence.condition_status_concept_id: "Status qualifier concept id."
  condition_occurrence.condition_status_concept_name: "Status qualifier (admitting, discharge, etc.)."

  # --- drug_exposure ---
  drug_exposure.drug_exposure_id:              "Primary key for one medication record."
  drug_exposure.person_id:                     "Patient receiving the medication."
  drug_exposure.drug_concept_id:               "Standard concept id for the drug."
  drug_exposure.drug_concept_name:             "Drug name (ingredient + strength + form when available)."
  drug_exposure.drug_exposure_start_date:      "Date the drug exposure started."
  drug_exposure.drug_exposure_start_datetime:  "Timestamp the drug exposure started."
  drug_exposure.drug_exposure_end_date:        "Date the drug exposure ended."
  drug_exposure.drug_exposure_end_datetime:    "Timestamp the drug exposure ended."
  drug_exposure.verbatim_end_date:             "Explicit end date from the source (vs. derived)."
  drug_exposure.drug_type_concept_id:          "Concept id for the source (EHR prescription, EHR administration, claim, etc.)."
  drug_exposure.drug_type_concept_name:        "Source type (EHR prescription, EHR administration record, claim)."
  drug_exposure.stop_reason:                   "Reason the drug was stopped."
  drug_exposure.refills:                       "Refill count on the original prescription."
  drug_exposure.quantity:                      "Quantity dispensed."
  drug_exposure.days_supply:                   "Days supply dispensed."
  drug_exposure.sig:                           "Free-text dosing instructions."
  drug_exposure.route_concept_id:              "Route concept id (oral / IV / subcutaneous / etc.)."
  drug_exposure.route_concept_name:            "Route of administration."
  drug_exposure.dose_unit_source_value:        "Unit of dose as recorded in the source (Tablet / Capsule / mL / etc.)."

  # --- measurement ---
  measurement.measurement_id:               "Primary key for one measurement record."
  measurement.person_id:                    "Patient the measurement belongs to."
  measurement.measurement_concept_id:       "Standard concept id for the measurement."
  measurement.measurement_concept_name:     "What was measured (LOINC-mapped where possible)."
  measurement.measurement_date:             "Date the measurement was taken."
  measurement.measurement_datetime:         "Timestamp the measurement was taken."
  measurement.measurement_type_concept_id:  "Concept id for the source (lab result, vital sign, etc.)."
  measurement.measurement_type_concept_name: "Source type (lab result, vital sign, claim)."
  measurement.value_as_number:              "Numeric value of the measurement."
  measurement.value_as_concept_id:          "Concept id for a categorical result."
  measurement.value_as_concept_name:        "Categorical result (e.g. 'APOE e3/e4')."
  measurement.unit_concept_id:              "Concept id for the unit of measure."
  measurement.unit_concept_name:            "Unit of measure (mg/dL, mmHg, etc.)."
  measurement.range_low:                    "Reference-range lower bound."
  measurement.range_high:                   "Reference-range upper bound."

  # --- observation ---
  observation.observation_id:                "Primary key for one observation record."
  observation.person_id:                     "Patient the observation belongs to."
  observation.observation_concept_id:        "Standard concept id for the observation."
  observation.observation_concept_name:      "What was observed (e.g. 'Body weight', 'ARIA-H')."
  observation.observation_date:              "Date the observation was recorded."
  observation.observation_datetime:          "Timestamp the observation was recorded."
  observation.observation_type_concept_id:   "Concept id for the source of the observation."
  observation.observation_type_concept_name: "Source of the observation (EHR, survey, abstraction)."
  observation.value_as_number:               "Numeric value of the observation."
  observation.value_as_string:               "Free-text / string value of the observation."
  observation.value_as_concept_id:           "Concept id for a categorical value."
  observation.value_as_concept_name:         "Categorical value (True / False / Positive / Negative / Independent)."
  observation.qualifier_concept_id:          "Qualifier concept id."
  observation.qualifier_concept_name:        "Qualifier (laterality, severity, etc.)."
  observation.unit_concept_id:               "Unit concept id."
  observation.unit_concept_name:             "Unit of measure."

  # --- procedure_occurrence ---
  procedure_occurrence.procedure_occurrence_id:   "Primary key for one procedure record."
  procedure_occurrence.person_id:                 "Patient the procedure was performed on."
  procedure_occurrence.procedure_concept_id:      "Standard concept id for the procedure."
  procedure_occurrence.procedure_concept_name:    "Procedure name (CPT / HCPCS / SNOMED mapped)."
  procedure_occurrence.procedure_date:            "Date the procedure was performed."
  procedure_occurrence.procedure_datetime:        "Timestamp the procedure was performed."
  procedure_occurrence.procedure_type_concept_id: "Concept id for the source of the procedure."
  procedure_occurrence.procedure_type_concept_name: "Source type (claim, EHR)."
  procedure_occurrence.quantity:                  "Quantity / units of the procedure."

  # --- visit_occurrence ---
  visit_occurrence.visit_occurrence_id:       "Primary key for one visit."
  visit_occurrence.person_id:                 "Patient seen on this visit."
  visit_occurrence.visit_concept_id:          "Concept id for the visit type."
  visit_occurrence.visit_concept_name:        "Visit type (Office Visit, Telehealth, Ambulatory Infusion Therapy Clinic, Diagnostic, etc.)."
  visit_occurrence.visit_start_date:          "Date the visit started."
  visit_occurrence.visit_start_datetime:      "Timestamp the visit started."
  visit_occurrence.visit_end_date:            "Date the visit ended."
  visit_occurrence.visit_end_datetime:        "Timestamp the visit ended."
  visit_occurrence.provider_id:               "Seen by this provider."
  visit_occurrence.care_site_id:              "Care site where the visit occurred."

  # --- note ---
  note.note_id:                 "Primary key for one clinical note."
  note.person_id:               "Patient the note is about."
  note.note_date:               "Date the note was written."
  note.note_class_concept_name: "Note class (Progress note, Office visit, Care plan, etc.)."
  note.note_text:               "Full text of the clinical note."
  note.language_concept_name:   "Language of the note."

  # --- document ---
  document.document_id:                "Primary key for one attached document."
  document.person_id:                  "Patient the document is about."
  document.document_date:              "Date of the document."
  document.document_type_concept_name: "Document type (MRI, PET, EEG, MMSE form, FAQ form, etc.)."
  document.document_title:             "Document title."

  # --- infusion ---
  infusion.drug_exposure_id:            "Primary key for one infusion record."
  infusion.person_id:                   "Patient receiving the infusion."
  infusion.drug_concept_name:           "Infused drug name (Leqembi / Kisunla / Aduhelm for MTC AAT)."
  infusion.drug_exposure_start_date:    "Infusion start date."
  infusion.drug_exposure_end_date:      "Infusion end date."
