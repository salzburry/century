# AAT (Anti-Amyloid Therapy) variable pack.
#
# Inherits the ADRD common base (demographics, vitals, diagnosis,
# biomarkers, visits, outcomes, reports) and adds the on-therapy
# rows that distinguish an AAT cohort from a broader Alzheimer's
# cohort:
#
#   - anti-amyloid prescription / administration (both brand and
#     generic names)
#   - infusion table (drug + start date + end date)
#   - ARIA-H (microhemorrhage) and ARIA-E (edema) — split out from
#     the generic ARIA row in the alzheimers pack
#   - anti-amyloid infusion procedure codes
#
# Deliberately does NOT include the alzheimers pack. Earlier AAT
# output inherited alzheimers' generic Medication (Prescription /
# Administration / Route) rows which overlapped with the AAT-specific
# ones below and produced a noisy Page 4.

include:
  - adrd_common

variables:
  # ----- Anti-amyloid therapy ---------------------------------------
  - category: Medications
    variable: Anti-amyloid Therapy (Prescription)
    description: Anti-amyloid monoclonal antibody prescriptions (Leqembi / Kisunla / Aduhelm).
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      (drug_type_concept_name ILIKE '%prescription%') AND
      (drug_concept_name ILIKE '%lecanemab%' OR
       drug_concept_name ILIKE '%Leqembi%' OR
       drug_concept_name ILIKE '%donanemab%' OR
       drug_concept_name ILIKE '%Kisunla%' OR
       drug_concept_name ILIKE '%aducanumab%' OR
       drug_concept_name ILIKE '%Aduhelm%')
    extraction_type: Structured
    notes: Cohort-defining therapies for MTC AAT.

  - category: Medications
    variable: Anti-amyloid Therapy (Administration)
    description: Anti-amyloid monoclonal antibody administration records.
    table: drug_exposure
    column: drug_concept_name
    # Mirror the prescription row's brand + generic matching — some
    # warehouses record administrations under brand names rather than
    # generic ingredient names.
    criteria: >
      (drug_type_concept_name ILIKE '%administration%') AND
      (drug_concept_name ILIKE '%lecanemab%' OR
       drug_concept_name ILIKE '%Leqembi%' OR
       drug_concept_name ILIKE '%donanemab%' OR
       drug_concept_name ILIKE '%Kisunla%' OR
       drug_concept_name ILIKE '%aducanumab%' OR
       drug_concept_name ILIKE '%Aduhelm%')
    extraction_type: Structured

  - category: Infusions
    variable: Infusion Drug
    description: Drug administered by infusion (anti-amyloid monoclonal antibodies).
    table: infusion
    column: drug_concept_id
    extraction_type: Structured
    notes: >
      Points at drug_concept_id because the infusion table does not
      carry a drug_concept_name column in some warehouses. When the
      vocabulary join is available, swap this row for a
      `concept_name`-based lookup.

  - category: Infusions
    variable: Infusion Start Date
    description: Start date of each infusion.
    table: infusion
    column: drug_exposure_start_date
    extraction_type: Structured

  - category: Infusions
    variable: Infusion End Date
    description: End date of each infusion, when recorded.
    table: infusion
    column: drug_exposure_end_date
    extraction_type: Structured
    notes: >
      Often null in current schemas; `Implemented: No` flag will
      surface this gap until the end-date field is populated.

  # ----- Observations (AAT-specific ARIA split) ---------------------
  - category: Observations
    variable: ARIA-H (microhemorrhage)
    description: Amyloid-related imaging abnormality — microhemorrhage or hemosiderosis.
    table: observation
    column: value_as_concept_name
    # `%ARIA-H%` (not `ARIA-H%`) so we match source labels like
    # "MRI finding - ARIA-H" or "Amyloid-related imaging abnormality ARIA-H".
    criteria: observation_concept_name ILIKE '%ARIA-H%'
    extraction_type: Structured
    notes: Safety surveillance for anti-amyloid therapy.

  - category: Observations
    variable: ARIA-E (edema)
    description: Amyloid-related imaging abnormality — edema or effusion.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%ARIA-E%'
    extraction_type: Structured
    notes: Safety surveillance for anti-amyloid therapy.

  # ----- Procedures -------------------------------------------------
  - category: Procedures
    variable: Anti-amyloid Infusion Procedure
    description: Procedure codes for anti-amyloid infusions (injection / IV infusion administration).
    table: procedure_occurrence
    column: procedure_concept_name
    # "Chemotherapy administration" is broad on purpose — many HCPCS
    # infusion-administration codes (e.g., 96413) don't carry the
    # drug name in procedure_concept_name, so they're filed under
    # generic chemotherapy / infusion administration. Patient-level
    # attribution to anti-amyloid therapy should be confirmed by
    # joining to the `Anti-amyloid Therapy (Administration)` variable
    # above.
    criteria: >
      procedure_concept_name ILIKE '%lecanemab%' OR
      procedure_concept_name ILIKE '%donanemab%' OR
      procedure_concept_name ILIKE '%aducanumab%' OR
      procedure_concept_name ILIKE '%Chemotherapy administration%' OR
      procedure_concept_name ILIKE '%intravenous infusion%'
    extraction_type: Structured
    notes: >
      The Chemotherapy administration / IV infusion lines capture
      HCPCS administration codes that don't carry the drug name.
      Cross-reference against the Medications (Administration) row
      to confirm AAT-specific attribution.
