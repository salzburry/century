# Nimbus COPD — final variables pack.
#
# Cohort-specific source of truth for packs/cohorts/nimbus_copd.yaml.
# Inherits every COPD-level row from copd_common (which in turn
# includes respiratory_common) and adds cohort-specific rows that only
# make sense for the Nimbus COPD curated ETL.
#
# Edit this file when:
#   - Nimbus COPD abstraction pipeline lands a new standardised table
#     (parallel to eosinophil_standardized)
#   - A concept-name pattern diverges from the copd_common default in
#     this cohort only
#
# Do NOT edit this file when:
#   - A change applies to every COPD cohort we ship — that goes in
#     copd_common.yaml so Nimbus AZ COPD inherits it too
#   - A change applies to every respiratory cohort — that goes in
#     respiratory_common.yaml

include:
  - copd_common

variables:
  # ----- Labs / Biomarkers — Nimbus-curated abstractions -----------
  # Nimbus COPD curated ships a dedicated absolute-blood-eosinophil
  # abstraction table (`eosinophil_standardized`). Confirmed in
  # Output/minbuscopdcurated.pdf: value_as_number populated 100%,
  # Median 140, IQR 100-260 — consistent with cells/µL.
  #
  # Kept alongside the copd_common / respiratory_common row that
  # points at `measurement.value_as_number` so non-curated COPD
  # cohorts that record eosinophils as ordinary lab measurements
  # still surface a hit there. Live build should show Implemented=Yes
  # on this row for Nimbus COPD curated.
  - category: Labs / Biomarkers
    variable: Blood Eosinophils (Standardized, Nimbus curated)
    description: >
      Absolute blood eosinophil count from the Nimbus curated
      abstraction pipeline. Parallel to the shared "Blood Eosinophils"
      row — this one points at the Nimbus-COPD-curated-only
      `eosinophil_standardized` abstraction table.
    table: eosinophil_standardized
    column: value_as_number
    extraction_type: Structured
    notes: >
      Table ships only in the nimbus_copd_curated schema. If a future
      Nimbus cohort adopts the same abstraction, copy this row into
      that cohort's per-cohort variable pack rather than promoting it
      to copd_common — the table name is specific to the Nimbus
      curated ETL, not a COPD-wide convention.
