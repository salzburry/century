# CKD (Chronic Kidney Disease) — shared variable base.
#
# Intermediate layer, not a final pack: every CKD cohort has its own
# ETL, so the final source of truth lives in a per-cohort pack under
# `packs/variables/<cohort>.yaml` (today: balboa_ckd.yaml, drg_ckd.yaml)
# that `include: [ckd_common]` and owns its own cohort-specific rows.
# This file carries only logic that is genuinely identical across every
# CKD cohort we ship.
#
# Plays the role of both the shared respiratory base AND the disease-
# common pack — there is currently only one renal disease in scope
# (CKD), so the second-layer split (renal_common -> ckd_common) that
# the respiratory packs use would be premature. If a separate Acute
# Kidney Injury or Glomerulonephritis cohort lands later, refactor to
# introduce a renal_common parent and pull the demographics / vitals /
# generic visits rows up into it.
#
# Tables intentionally NOT used (confirmed missing from the
# Output/balboackd.pdf and Output/drgckd.pdf cohort dumps):
#   - location              → no ZIP code (3-digit prefix) row
#   - payer_plan_period     → no Payer Type row
#   - document              → no Document row
#   - infusion              → no infusion-specific medication rows
#
# Clinical provenance: rows here are drawn from the concept names
# actually seen in the Balboa and DRG raw dumps (serum creatinine,
# urea nitrogen, hemoglobin, potassium, dialysis dependence,
# ESRD / hypertensive renal disease, amlodipine / lisinopril /
# furosemide / sodium bicarbonate). Standard-of-care medications
# expected but not directly confirmed in the dumps (SGLT2 inhibitors,
# MRAs, ESAs) carry a TODO note so a live build can confirm presence
# before reviewers count on the row.

variables:
  # ----- Demographics -------------------------------------------------
  - category: Demographics
    variable: Ethnicity
    description: The patient's self-identified ethnicity, distinguishing Hispanic or Latino origin.
    table: person
    column: ethnicity_concept_name
    extraction_type: Structured
    notes: Ethnicity is not reliably recorded at many sites.

  - category: Demographics
    variable: Race
    description: The patient's self-identified racial category.
    table: person
    column: race_concept_name
    extraction_type: Structured
    notes: Race is not reliably recorded at many sites.

  - category: Demographics
    variable: Sex
    description: The patient's biological sex at birth.
    table: person
    column: gender_concept_name
    extraction_type: Structured

  - category: Demographics
    variable: Birth Year
    description: Year the patient was born. Used for age calculation.
    table: person
    column: year_of_birth
    extraction_type: Structured

  - category: Demographics
    variable: Language
    description: Primary language of the patient.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%language%'
    inclusion_criteria: Records are included for each primary-language observation recorded for the patient.
    extraction_type: Structured

  - category: Demographics
    variable: Marital Status
    description: Marital status of the patient.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%marital status%'
    inclusion_criteria: Records are included for each marital-status observation recorded for the patient.
    extraction_type: Structured

  # ----- Vitals -------------------------------------------------------
  # Sites split blood pressure differently. The two BP rows below
  # cover both common storage shapes so neither representation is
  # silently lost.
  #
  # Provenance (kept here in YAML comments so the user-facing
  # Variables sheet stays cohort-agnostic):
  #   Balboa CKD records separate "Diastolic blood pressure" and
  #     "Systolic blood pressure" observations in
  #     observation.value_as_number — each row is 15.1% of all
  #     observations in Output/balboackd.pdf.
  #   DRG CKD records a combined "Sitting blood pressure" entry in
  #     observation.value_as_string — 12.0% of observations in
  #     Output/drgckd.pdf.
  - category: Vitals
    variable: Blood Pressure (Combined)
    description: >
      Combined-format blood-pressure readings (e.g. "120/80") stored
      as an observation value string.
    table: observation
    column: value_as_string
    criteria: observation_concept_name ILIKE '%blood pressure%'
    inclusion_criteria: Records are included for each combined-format blood-pressure reading (e.g. "120/80") stored as an observation value string for the patient. Numeric systolic and diastolic readings appear under the Blood Pressure (Systolic / Diastolic, numeric) row instead.
    extraction_type: Structured
    notes: Sites that record systolic and diastolic blood pressures numerically as separate observations populate the Blood Pressure (Systolic / Diastolic, numeric) row instead.

  - category: Vitals
    variable: Blood Pressure (Systolic / Diastolic, numeric)
    description: >
      Systolic and diastolic blood pressure recorded as separate
      numeric observations.
    table: observation
    column: value_as_number
    criteria: >
      observation_concept_name ILIKE '%systolic blood pressure%' OR
      observation_concept_name ILIKE '%diastolic blood pressure%'
    inclusion_criteria: Records are included for each systolic or diastolic blood-pressure measurement stored as a numeric observation for the patient. Combined-format readings (e.g. "120/80") appear under the Blood Pressure (Combined) row instead.
    extraction_type: Structured
    notes: Scoped to systolic and diastolic concepts so the generic "Blood pressure" concept (typically stored as a string) does not leak into this numeric row. Combined-format readings appear under the Blood Pressure (Combined) row instead.

  - category: Vitals
    variable: Temperature
    description: Patient temperature taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%temperature%'
    inclusion_criteria: Records are included for each body-temperature measurement recorded for the patient at an office visit.
    extraction_type: Structured

  - category: Vitals
    variable: Heart Rate
    description: Patient heart rate / pulse taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%heart rate%' OR observation_concept_name ILIKE '%pulse%'
    inclusion_criteria: Records are included for each heart-rate or pulse measurement recorded for the patient at an office visit.
    extraction_type: Structured

  - category: Vitals
    variable: Body Weight
    description: Patient weight taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%body weight%' OR observation_concept_name ILIKE '%weight%'
    inclusion_criteria: Records are included for each body-weight measurement recorded for the patient at an office visit.
    extraction_type: Structured

  - category: Vitals
    variable: Patient Height
    description: Patient height recorded at the office visit.
    table: observation
    column: value_as_string
    criteria: observation_concept_name ILIKE '%height%'
    inclusion_criteria: Records are included for each patient-height measurement recorded for the patient at an office visit.
    extraction_type: Structured

  - category: Vitals
    variable: BMI (Body Mass Index)
    description: >
      Body mass index — needed for renal-replacement-therapy planning,
      transplant eligibility, and SGLT2-inhibitor / GLP-1 dosing
      considerations.
    table: observation
    column: value_as_number
    criteria: >
      observation_concept_name ILIKE '%body mass index%' OR
      observation_concept_name ILIKE '%BMI%'
    inclusion_criteria: Records are included for each body-mass-index (BMI) measurement recorded for the patient.
    extraction_type: Structured

  # ----- Observations -------------------------------------------------
  - category: Observations
    variable: Allergies
    description: Observation of patient allergies.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%allerg%'
    inclusion_criteria: Records are included for each patient-allergy observation recorded for the patient.
    extraction_type: Structured

  # The shared Smoking Status row targets the OMOP `observation`
  # table. Sites that capture smoking as a procedure-coded SNOMED
  # status concept add a parallel row in their per-cohort pack — see
  # packs/variables/drg_ckd.yaml for the current example — so the
  # cohort-specific row doesn't leak into workbooks where the
  # concept isn't actually populated.
  - category: Observations
    variable: Smoking Status
    description: >
      Current / former / never smoker status. CKD outcomes depend on
      smoking cessation; cardiovascular risk is doubled in smokers
      with CKD.
    table: observation
    column: value_as_concept_name
    criteria: >
      observation_concept_name ILIKE '%smoking%' OR
      observation_concept_name ILIKE '%tobacco%' OR
      observation_concept_name ILIKE '%cigarette%'
    inclusion_criteria: Records are included for each smoking-status observation (current, former, or never smoker; tobacco use; cigarette use) recorded for the patient.
    extraction_type: Structured
    notes: Some warehouses map smoking status onto condition_occurrence (e.g. "Tobacco use disorder") instead of observation; the DRG cohort also surfaces it as a procedure-coded SNOMED concept. Pack-year burden is a separate abstracted variable.

  # ----- Diagnosis ----------------------------------------------------
  - category: Diagnosis
    variable: Diagnosis
    description: Medical diagnoses and conditions recorded for the patient.
    table: condition_occurrence
    column: condition_concept_name
    extraction_type: Structured

  - category: Diagnosis
    variable: Diagnosis Type
    description: Source from which the diagnosis was captured.
    table: condition_occurrence
    column: condition_type_concept_name
    extraction_type: Structured

  - category: Diagnosis
    variable: Diagnosis Start Date
    description: Date the condition was first recorded.
    table: condition_occurrence
    column: condition_start_date
    extraction_type: Structured

  # ----- Diagnosis - CKD-specific -----------------------------------
  - category: Diagnosis
    variable: CKD Diagnosis
    description: >
      Chronic kidney disease diagnosis — includes stage 1-5 variants,
      end-stage renal disease (ESRD), dependence on renal dialysis, and
      hypertensive / diabetic renal disease umbrella codes.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%chronic kidney disease%' OR
      condition_concept_name ILIKE '%CKD%' OR
      condition_concept_name ILIKE '%end stage renal disease%' OR
      condition_concept_name ILIKE '%ESRD%' OR
      condition_concept_name ILIKE '%dependence on renal dialysis%' OR
      condition_concept_name ILIKE '%hypertensive renal disease%' OR
      condition_concept_name ILIKE '%diabetic nephropathy%' OR
      condition_concept_name ILIKE '%diabetes%kidney%'
    inclusion_criteria: Records are included for each diagnosis of chronic kidney disease, end-stage renal disease (ESRD), dependence on renal dialysis, hypertensive renal disease, or diabetic nephropathy recorded for the patient.
    extraction_type: Structured
    notes: >
      Indication-defining diagnosis for chronic kidney disease
      populations. Acute kidney injury is tracked separately below —
      a different acuity, but the two often co-exist.

  - category: Diagnosis
    variable: Acute Kidney Injury
    description: >
      Acute kidney injury / acute renal failure — distinct from CKD
      (sudden decline in function) but often overlaps in CKD patients.
      Tracked separately so reviewers can distinguish acute episodes
      from baseline chronic disease.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%acute kidney failure%' OR
      condition_concept_name ILIKE '%acute renal failure%' OR
      condition_concept_name ILIKE '%acute kidney injury%' OR
      condition_concept_name ILIKE '%AKI%'
    inclusion_criteria: Records are included for each diagnosis of acute kidney injury or acute renal failure (AKI) recorded for the patient.
    extraction_type: Structured

  # Comorbidity / staging-marker condition rows. Provenance:
  #   Proteinuria / Albuminuria — DRG #2 condition (5.2%);
  #   Hypertension (essential)  — DRG #1 condition (12.2%);
  #   Vitamin D Deficiency      — DRG #5 condition (3.7%).
  - category: Diagnosis
    variable: Proteinuria / Albuminuria
    description: >
      Proteinuria (bulk urine protein) and albuminuria (albumin-
      specific) — earliest clinical sign of kidney damage and the
      A-stage driver of CKD G/A staging.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%proteinuria%' OR
      condition_concept_name ILIKE '%albuminuria%' OR
      condition_concept_name ILIKE '%microalbuminuria%'
    inclusion_criteria: Records are included for each diagnosis of proteinuria, albuminuria, or microalbuminuria recorded for the patient — the A-stage driver of CKD G/A staging.
    extraction_type: Structured

  - category: Diagnosis
    variable: Hypertension
    description: >
      Essential or primary hypertension — the dominant CKD comorbidity
      and one of its leading causes. Hypertensive renal disease is
      tracked under the CKD Diagnosis row, so this row stays scoped
      to non-renal hypertensive disorders.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%essential%hypertension%' OR
      condition_concept_name ILIKE '%primary%hypertension%' OR
      condition_concept_name ILIKE '%hypertensive disorder%' OR
      condition_concept_name ILIKE '%benign hypertension%'
    inclusion_criteria: Records are included for each diagnosis of essential or primary hypertension, hypertensive disorder, or benign hypertension recorded for the patient. Hypertensive renal disease is captured under the CKD Diagnosis row to avoid double counting.
    extraction_type: Structured
    notes: Narrowed to essential, primary, and hypertensive-disorder variants so hypertensive renal disease — already captured by the CKD Diagnosis row — is not counted twice.

  - category: Diagnosis
    variable: Vitamin D Deficiency
    description: >
      Vitamin D deficiency — common in CKD because the kidney
      performs the final 1-alpha-hydroxylation that activates
      vitamin D.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%vitamin D deficiency%' OR
      condition_concept_name ILIKE '%25-hydroxyvitamin D deficiency%'
    inclusion_criteria: Records are included for each diagnosis of vitamin D deficiency (including 25-hydroxyvitamin D deficiency) recorded for the patient.
    extraction_type: Structured

  # ----- Labs / Biomarkers - CKD core -------------------------------
  # Serum creatinine and BUN are the workhorses of CKD monitoring.
  # eGFR is universally derived from creatinine + age + sex but may
  # not be stored as a discrete measurement at every site.
  - category: Labs / Biomarkers
    variable: Serum Creatinine
    description: >
      Serum or plasma creatinine concentration — primary input to
      eGFR calculation and the most-tracked CKD biomarker.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%creatinine%' AND
      (measurement_concept_name ILIKE '%serum%' OR
       measurement_concept_name ILIKE '%plasma%' OR
       measurement_concept_name ILIKE '%blood%')
    inclusion_criteria: Records are included for each serum, plasma, or blood creatinine measurement recorded for the patient. Urine-creatinine measurements are excluded.
    extraction_type: Structured
    notes: Scoped to serum, plasma, or blood specimens; urine creatinine is captured separately under the UACR row.

  - category: Labs / Biomarkers
    variable: Estimated GFR (eGFR)
    description: >
      Estimated glomerular filtration rate — derived from serum
      creatinine, age, and sex. Drives CKD staging (G1-G5).
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%glomerular filtration%' OR
      measurement_concept_name ILIKE '%eGFR%' OR
      measurement_concept_name ILIKE '%GFR%estimated%' OR
      measurement_concept_name ILIKE '%estimated GFR%'
    inclusion_criteria: Records are included for each estimated glomerular filtration rate (eGFR) value abstracted for the patient — derived from serum creatinine, age, and sex; drives CKD G1–G5 staging.
    extraction_type: Abstracted
    notes: Some sites store eGFR only as a derived flag in the EHR rather than as a discrete measurement; downstream consumers can compute eGFR from the Serum Creatinine row using CKD-EPI 2021 when this row is sparse.

  - category: Labs / Biomarkers
    variable: BUN (Urea Nitrogen)
    description: >
      Blood urea nitrogen — secondary kidney function marker,
      sensitive to volume status and protein intake as well as GFR.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%urea nitrogen%' OR
      measurement_concept_name ILIKE '%BUN%'
    inclusion_criteria: Records are included for each blood-urea-nitrogen (BUN) measurement recorded for the patient.
    extraction_type: Structured

  - category: Labs / Biomarkers
    variable: Urine Albumin / Creatinine Ratio (UACR)
    description: >
      UACR — gold-standard albuminuria marker. Drives CKD staging
      (A1-A3) alongside eGFR.
    table: measurement
    column: value_as_number
    criteria: >
      (measurement_concept_name ILIKE '%albumin%creatinine%ratio%' OR
       measurement_concept_name ILIKE '%albumin/creatinine%ratio%' OR
       measurement_concept_name ILIKE '%microalbumin%creatinine%' OR
       measurement_concept_name ILIKE '%UACR%') AND
      measurement_concept_name ILIKE '%urine%'
    inclusion_criteria: Records are included for each urine albumin/creatinine ratio (UACR) measurement recorded for the patient — gold-standard albuminuria marker driving CKD A1–A3 staging.
    extraction_type: Structured
    notes: Some cohorts report a urea/creatinine ratio in urine instead of the canonical albumin/creatinine ratio; the two are different labs and the urea form does not match this row.

  - category: Labs / Biomarkers
    variable: Hemoglobin
    description: >
      Blood hemoglobin concentration — anemia of CKD is common at
      eGFR < 60; threshold for ESA initiation is typically Hb < 10 g/dL.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%hemoglobin%' AND
      (measurement_concept_name ILIKE '%blood%' OR
       measurement_concept_name ILIKE '%mass/volume%')
    inclusion_criteria: Records are included for each blood hemoglobin measurement recorded for the patient. Glycated hemoglobin (HbA1c) is captured separately.
    extraction_type: Structured
    notes: Scoped to whole-blood and mass-per-volume hemoglobin; glycated hemoglobin (HbA1c) and other hemoglobin variants are tracked separately.

  - category: Labs / Biomarkers
    variable: Serum Potassium
    description: >
      Serum or plasma potassium — managed actively in CKD due to
      hyperkalemia risk from RAAS-blockade therapy and reduced
      excretion.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%potassium%' AND
      (measurement_concept_name ILIKE '%serum%' OR
       measurement_concept_name ILIKE '%plasma%' OR
       measurement_concept_name ILIKE '%blood%')
    inclusion_criteria: Records are included for each serum, plasma, or blood potassium measurement recorded for the patient.
    extraction_type: Structured

  # Provenance for the electrolyte panel below:
  #   Serum Calcium  — Balboa #3 measurement (3.6%);
  #   Serum Sodium   — appears in DRG top measurements.
  - category: Labs / Biomarkers
    variable: Serum Calcium
    description: >
      Serum or plasma calcium — core CKD-MBD (mineral and bone
      disorder) marker, interpreted together with phosphorus and
      parathyroid hormone.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%calcium%' AND
      (measurement_concept_name ILIKE '%serum%' OR
       measurement_concept_name ILIKE '%plasma%' OR
       measurement_concept_name ILIKE '%blood%')
    inclusion_criteria: Records are included for each serum, plasma, or blood calcium measurement recorded for the patient. Urine calcium and calcium-channel-blocker drug mentions are excluded.
    extraction_type: Structured
    notes: Scoped to serum, plasma, and blood specimens; urine calcium and calcium-channel-blocker drug mentions are excluded. Ionised vs total calcium can be split in a per-cohort row.

  - category: Labs / Biomarkers
    variable: Serum Sodium
    description: >
      Serum or plasma sodium — tracked in CKD for volume / free-water
      balance, hyponatremia-related seizure risk, and response to
      diuretic therapy.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%sodium%' AND
      (measurement_concept_name ILIKE '%serum%' OR
       measurement_concept_name ILIKE '%plasma%' OR
       measurement_concept_name ILIKE '%blood%')
    inclusion_criteria: Records are included for each serum, plasma, or blood sodium measurement recorded for the patient. Urine sodium and sodium-bicarbonate drug mentions are excluded.
    extraction_type: Structured
    notes: Scoped to serum, plasma, and blood specimens; urine sodium and sodium-bicarbonate drug mentions are excluded — the drug is captured under the Sodium Bicarbonate medication row.

  - category: Labs / Biomarkers
    variable: HbA1c (Hemoglobin A1c)
    description: >
      Glycated hemoglobin — diabetic CKD monitoring. Co-management
      target typically 6.5-7.5% in early CKD, individualised below
      that as CKD progresses.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%hemoglobin A1c%' OR
      measurement_concept_name ILIKE '%HbA1c%' OR
      measurement_concept_name ILIKE '%glycated hemoglobin%' OR
      measurement_concept_name ILIKE '%A1c%'
    inclusion_criteria: Records are included for each glycated-hemoglobin (HbA1c, A1c) measurement recorded for the patient.
    extraction_type: Structured
    notes: Standard-of-care for diabetic CKD but not always recorded as a discrete laboratory measurement; sites that capture HbA1c only as an observation will not surface here.

  # ----- Visits -------------------------------------------------------
  - category: Visits
    variable: Visit Type
    description: Type of healthcare visit or encounter.
    table: visit_occurrence
    column: visit_concept_name
    extraction_type: Structured

  - category: Visits
    variable: Visit Date
    description: Start date of each visit.
    table: visit_occurrence
    column: visit_start_date
    extraction_type: Structured

  # ----- Procedures - dialysis / vascular access --------------------
  - category: Procedures
    variable: Dialysis (Hemodialysis or Peritoneal)
    description: >
      Dialysis procedure codes — hemodialysis or peritoneal dialysis
      sessions. Anchor for ESRD progression tracking and cohort
      enrichment.
    table: procedure_occurrence
    column: procedure_concept_name
    criteria: >
      procedure_concept_name ILIKE '%hemodialysis%' OR
      procedure_concept_name ILIKE '%peritoneal dialysis%' OR
      procedure_concept_name ILIKE '%dialysis%'
    inclusion_criteria: Records are included for each dialysis session — hemodialysis or peritoneal — recorded for the patient.
    extraction_type: Structured
    notes: >
      Includes both modalities under one row; separate them in a
      per-cohort pack if the reviewer needs HD vs PD broken out.

  - category: Procedures
    variable: Dialysis Vascular Access
    description: >
      Vascular access procedures for dialysis — AV fistula creation,
      AV graft placement, dialysis catheter insertion.
    table: procedure_occurrence
    column: procedure_concept_name
    criteria: >
      procedure_concept_name ILIKE '%arteriovenous fistula%' OR
      procedure_concept_name ILIKE '%AV fistula%' OR
      procedure_concept_name ILIKE '%AV graft%' OR
      procedure_concept_name ILIKE '%dialysis catheter%' OR
      procedure_concept_name ILIKE '%hemodialysis access%'
    inclusion_criteria: Records are included for each dialysis vascular-access procedure recorded for the patient — AV fistula creation, AV graft placement, or dialysis catheter insertion.
    extraction_type: Structured

  - category: Procedures
    variable: Kidney Biopsy
    description: Renal biopsy procedure — used to characterise glomerular disease.
    table: procedure_occurrence
    column: procedure_concept_name
    criteria: >
      procedure_concept_name ILIKE '%kidney biopsy%' OR
      procedure_concept_name ILIKE '%renal biopsy%' OR
      procedure_concept_name ILIKE '%biopsy%kidney%'
    inclusion_criteria: Records are included for each renal or kidney biopsy procedure recorded for the patient.
    extraction_type: Structured

  # Provenance: Balboa #3 procedure (13.3%) — "End-stage renal
  # disease (ESRD) related services monthly, for patients 20 years
  # of age and older; with 4 or more face-to-face visits ...".
  - category: Procedures
    variable: End-Stage Renal Disease (ESRD) Monthly Services
    description: >
      CPT 9095X-9096X monthly ESRD-related E&M services for patients
      on dialysis. Kept distinct from the Dialysis row above because
      these are billing / E&M records, not dialysis-session
      procedures — conflating them would overclaim dialysis rates.
    table: procedure_occurrence
    column: procedure_concept_name
    criteria: >
      procedure_concept_name ILIKE '%end-stage renal disease%services%' OR
      procedure_concept_name ILIKE '%end stage renal disease%services%' OR
      procedure_concept_name ILIKE '%ESRD%services%' OR
      procedure_concept_name ILIKE '%ESRD%related%'
    inclusion_criteria: Records are included for each CPT 9095X-9096X monthly ESRD-related E&M service billed for the patient. These are billing records rather than dialysis-session procedures.
    extraction_type: Structured

  # ----- Medications - CKD pharmacotherapy --------------------------
  # Class-level rows. Criteria filter drug_concept_name on the FDA-
  # approved active ingredient names so branded labels still match
  # through the ingredient substring.
  - category: Medications
    variable: RAAS Blockade (ACE Inhibitor / ARB)
    description: >
      Renin-angiotensin-aldosterone system blockade — ACE inhibitors
      (lisinopril, enalapril, ramipril, benazepril) and angiotensin
      receptor blockers (losartan, valsartan, olmesartan, irbesartan,
      candesartan). Foundational CKD therapy; reduces proteinuria
      and slows eGFR decline.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%lisinopril%' OR
      drug_concept_name ILIKE '%enalapril%' OR
      drug_concept_name ILIKE '%ramipril%' OR
      drug_concept_name ILIKE '%benazepril%' OR
      drug_concept_name ILIKE '%captopril%' OR
      drug_concept_name ILIKE '%losartan%' OR
      drug_concept_name ILIKE '%valsartan%' OR
      drug_concept_name ILIKE '%olmesartan%' OR
      drug_concept_name ILIKE '%irbesartan%' OR
      drug_concept_name ILIKE '%candesartan%' OR
      drug_concept_name ILIKE '%telmisartan%'
    inclusion_criteria: Records are included for each prescription or administration of an ACE inhibitor (lisinopril, enalapril, ramipril, benazepril, captopril) or angiotensin-receptor blocker (losartan, valsartan, olmesartan, irbesartan, candesartan, telmisartan) recorded for the patient.
    extraction_type: Structured

  - category: Medications
    variable: SGLT2 Inhibitor
    description: >
      Sodium-glucose cotransporter-2 inhibitors — empagliflozin,
      dapagliflozin, canagliflozin. Approved for CKD progression
      reduction independent of diabetes status.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%empagliflozin%' OR
      drug_concept_name ILIKE '%dapagliflozin%' OR
      drug_concept_name ILIKE '%canagliflozin%' OR
      drug_concept_name ILIKE '%ertugliflozin%' OR
      drug_concept_name ILIKE '%Jardiance%' OR
      drug_concept_name ILIKE '%Farxiga%' OR
      drug_concept_name ILIKE '%Invokana%'
    inclusion_criteria: Records are included for each SGLT2-inhibitor exposure (empagliflozin/Jardiance, dapagliflozin/Farxiga, canagliflozin/Invokana, ertugliflozin) recorded for the patient.
    extraction_type: Structured
    notes: Lower utilisation is expected at sites whose data predates broad SGLT2 adoption.

  - category: Medications
    variable: Mineralocorticoid Receptor Antagonist (MRA)
    description: >
      Steroidal MRAs (spironolactone, eplerenone) and the
      non-steroidal MRA finerenone — slow CKD progression in
      diabetic kidney disease.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%spironolactone%' OR
      drug_concept_name ILIKE '%eplerenone%' OR
      drug_concept_name ILIKE '%finerenone%' OR
      drug_concept_name ILIKE '%Kerendia%' OR
      drug_concept_name ILIKE '%Aldactone%'
    inclusion_criteria: Records are included for each mineralocorticoid-receptor-antagonist exposure recorded for the patient — steroidal MRAs (spironolactone/Aldactone, eplerenone) and the non-steroidal MRA finerenone (Kerendia).
    extraction_type: Structured
    notes: Finerenone (Kerendia) is the newest agent in this class; lower utilisation in older cohorts.

  - category: Medications
    variable: Loop Diuretic
    description: >
      Loop diuretics — furosemide, bumetanide, torsemide,
      ethacrynic acid. Volume management in CKD; cardiovascular and
      pulmonary congestion control.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%furosemide%' OR
      drug_concept_name ILIKE '%bumetanide%' OR
      drug_concept_name ILIKE '%torsemide%' OR
      drug_concept_name ILIKE '%torasemide%' OR
      drug_concept_name ILIKE '%ethacrynic%' OR
      drug_concept_name ILIKE '%Lasix%'
    inclusion_criteria: Records are included for each loop-diuretic exposure (furosemide/Lasix, bumetanide, torsemide, ethacrynic acid) recorded for the patient.
    extraction_type: Structured

  # Provenance: amlodipine is the #3-4 most-frequent drug in BOTH
  # Balboa (1.6%) and DRG (1.1%) raw dumps.
  - category: Medications
    variable: Calcium Channel Blocker
    description: >
      Calcium channel blockers used for blood-pressure control in
      CKD, often paired with an ACE-i / ARB. Covers both
      dihydropyridine agents (amlodipine, nifedipine, felodipine,
      nicardipine, isradipine) and non-dihydropyridine agents
      (diltiazem, verapamil) since both classes are prescribed for
      the same HTN-in-CKD indication.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%amlodipine%' OR
      drug_concept_name ILIKE '%nifedipine%' OR
      drug_concept_name ILIKE '%felodipine%' OR
      drug_concept_name ILIKE '%nicardipine%' OR
      drug_concept_name ILIKE '%isradipine%' OR
      drug_concept_name ILIKE '%diltiazem%' OR
      drug_concept_name ILIKE '%verapamil%' OR
      drug_concept_name ILIKE '%Norvasc%' OR
      drug_concept_name ILIKE '%Procardia%'
    inclusion_criteria: Records are included for each calcium-channel-blocker exposure recorded for the patient — dihydropyridines (amlodipine/Norvasc, nifedipine/Procardia, felodipine, nicardipine, isradipine) and non-dihydropyridines (diltiazem, verapamil).
    extraction_type: Structured
    notes: CCBs are foundational for blood-pressure management in CKD (where ACE-i / ARB alone rarely reaches target) but are not CKD-specific. Class-level breakdown into dihydropyridine and non-dihydropyridine subtypes is available in per-cohort packs.

  - category: Medications
    variable: Statin (HMG-CoA Reductase Inhibitor)
    description: >
      Statins — atorvastatin, rosuvastatin, simvastatin, pravastatin,
      pitavastatin, lovastatin. Cardiovascular-risk reduction in CKD
      patients.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%atorvastatin%' OR
      drug_concept_name ILIKE '%rosuvastatin%' OR
      drug_concept_name ILIKE '%simvastatin%' OR
      drug_concept_name ILIKE '%pravastatin%' OR
      drug_concept_name ILIKE '%pitavastatin%' OR
      drug_concept_name ILIKE '%lovastatin%' OR
      drug_concept_name ILIKE '%fluvastatin%'
    inclusion_criteria: Records are included for each statin exposure (atorvastatin, rosuvastatin, simvastatin, pravastatin, pitavastatin, lovastatin, fluvastatin) recorded for the patient.
    extraction_type: Structured
    notes: Standard-of-care in CKD with cardiovascular risk; not all sites surface every branded statin under the same concept.

  # Provenance: aspirin 81 MG appears among the top drugs in both
  # Balboa and DRG raw dumps (DRG #1 drug, 1.2%).
  - category: Medications
    variable: Aspirin (Antiplatelet)
    description: >
      Low-dose aspirin — cardiovascular-event prevention in CKD
      patients with established atherosclerotic disease.
    table: drug_exposure
    column: drug_concept_name
    criteria: drug_concept_name ILIKE '%aspirin%'
    inclusion_criteria: Records are included for each aspirin exposure recorded for the patient — low-dose antiplatelet therapy used for cardiovascular-event prevention.
    extraction_type: Structured
    notes: >
      Not CKD-specific; aspirin is a cross-cohort cardiovascular-
      prevention marker. Useful for reviewers triaging combined
      CKD + CVD exposure; do not use this row alone to attribute
      a cardiovascular prevention regimen.

  - category: Medications
    variable: Sodium Bicarbonate (Acidosis Correction)
    description: >
      Oral sodium bicarbonate — used to correct metabolic acidosis
      in advanced CKD; target serum bicarbonate >= 22 mEq/L.
    table: drug_exposure
    column: drug_concept_name
    criteria: drug_concept_name ILIKE '%sodium bicarbonate%'
    inclusion_criteria: Records are included for each oral sodium-bicarbonate exposure recorded for the patient — used to correct metabolic acidosis in advanced CKD.
    extraction_type: Structured

  - category: Medications
    variable: Phosphate Binder
    description: >
      Phosphate binders — sevelamer, calcium acetate, lanthanum,
      sucroferric oxyhydroxide, ferric citrate. Manage
      hyperphosphatemia in advanced CKD / dialysis.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%sevelamer%' OR
      drug_concept_name ILIKE '%calcium acetate%' OR
      drug_concept_name ILIKE '%lanthanum%' OR
      drug_concept_name ILIKE '%sucroferric%' OR
      drug_concept_name ILIKE '%ferric citrate%' OR
      drug_concept_name ILIKE '%Renvela%' OR
      drug_concept_name ILIKE '%Renagel%' OR
      drug_concept_name ILIKE '%PhosLo%'
    inclusion_criteria: Records are included for each phosphate-binder exposure (sevelamer/Renvela/Renagel, calcium acetate/PhosLo, lanthanum, sucroferric oxyhydroxide, ferric citrate) recorded for the patient.
    extraction_type: Structured
    notes: Utilisation typically appears in dialysis-eligible patients only.

  - category: Medications
    variable: Potassium Binder
    description: >
      Potassium-binding resins — patiromer (Veltassa), sodium
      zirconium cyclosilicate (Lokelma), sodium polystyrene sulfonate
      (Kayexalate). Manage hyperkalemia, often paired with RAAS
      blockade continuation.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%patiromer%' OR
      drug_concept_name ILIKE '%sodium zirconium%' OR
      drug_concept_name ILIKE '%sodium polystyrene%' OR
      drug_concept_name ILIKE '%Veltassa%' OR
      drug_concept_name ILIKE '%Lokelma%' OR
      drug_concept_name ILIKE '%Kayexalate%'
    inclusion_criteria: Records are included for each potassium-binder exposure (patiromer/Veltassa, sodium zirconium cyclosilicate/Lokelma, sodium polystyrene sulfonate/Kayexalate) recorded for the patient.
    extraction_type: Structured
    notes: Newer agents (patiromer, sodium zirconium cyclosilicate) may not appear in older cohorts.

  - category: Medications
    variable: Erythropoiesis-Stimulating Agent (ESA)
    description: >
      Erythropoiesis-stimulating agents — epoetin alfa, darbepoetin
      alfa, methoxy polyethylene glycol-epoetin beta. Treat anemia of
      CKD when Hb < 10 g/dL.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%epoetin%' OR
      drug_concept_name ILIKE '%darbepoetin%' OR
      drug_concept_name ILIKE '%methoxy polyethylene glycol-epoetin%' OR
      drug_concept_name ILIKE '%Epogen%' OR
      drug_concept_name ILIKE '%Procrit%' OR
      drug_concept_name ILIKE '%Aranesp%' OR
      drug_concept_name ILIKE '%Mircera%'
    inclusion_criteria: Records are included for each erythropoiesis-stimulating-agent exposure recorded for the patient — epoetin alfa (Epogen, Procrit), darbepoetin alfa (Aranesp), or methoxy polyethylene glycol-epoetin beta (Mircera).
    extraction_type: Structured
    notes: Utilisation typically appears in dialysis or pre-dialysis CKD patients.

  # ----- Reports ------------------------------------------------------
  - category: Reports
    variable: Clinical Note
    description: Free text of the office-visit clinical note.
    table: note
    column: note_text
    extraction_type: Unstructured

  # ----- Outcomes - abstracted progression markers ------------------
  - category: Outcomes
    variable: Dialysis Initiation (Abstracted)
    description: >
      First dialysis session date — typically derived from a
      combination of the Dialysis procedure row above and a
      condition_occurrence flag. Marks the transition from CKD to
      ESRD-on-dialysis.
    table: condition_occurrence
    column: condition_start_date
    criteria: >
      condition_concept_name ILIKE '%dependence on renal dialysis%' OR
      condition_concept_name ILIKE '%end stage renal disease%'
    inclusion_criteria: Records are included for each first-dialysis transition event abstracted for the patient — captured via a dependence-on-dialysis or end-stage-renal-disease condition row. Full algorithmic definition requires joining the first dialysis procedure with the first ESRD condition per patient.
    extraction_type: Abstracted
    notes: Condition-side proxy only. A full algorithmic dialysis-initiation definition requires joining the first dialysis procedure with the first ESRD or dependence-on-dialysis condition per patient.

  - category: Outcomes
    variable: Kidney Transplant (Abstracted)
    description: >
      Kidney transplant event — terminus of CKD/ESRD progression.
      Captured as a procedure or diagnosis depending on how the site
      records the event.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%kidney transplant%' OR
      condition_concept_name ILIKE '%renal transplant%' OR
      condition_concept_name ILIKE '%post-transplant%kidney%' OR
      condition_concept_name ILIKE '%transplanted kidney%'
    inclusion_criteria: Records are included for each kidney-transplant event abstracted for the patient — kidney transplant, renal transplant, post-transplant kidney, or transplanted-kidney concepts.
    extraction_type: Abstracted
    notes: Some sites record transplant only as a procedure; if this row is sparse, mirror the row onto procedure_occurrence with appropriate CPT criteria.
