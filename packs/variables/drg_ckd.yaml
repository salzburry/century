# DRG CKD — final variables pack.
#
# Cohort-specific source of truth for packs/cohorts/drg_ckd.yaml.
# Inherits every CKD-level row from ckd_common and adds rows that are
# specific to how the DRG ETL captures data.
#
# Populate this file when:
#   - The DRG ETL starts emitting cohort-specific tables
#   - A concept-name pattern diverges from ckd_common in this cohort
#     only and a live build confirms it (e.g. DRG records
#     "Urea/Creatinine [Ratio] in Urine" rather than the canonical
#     UACR — if that's the only proxy DRG ships, a DRG-specific
#     UACR-style row may belong here)

include:
  - ckd_common

variables:
  # ----- Observations — DRG-specific smoking-status capture -------
  # DRG records smoking status as a SNOMED concept in
  # `procedure_occurrence` (5.6% of all procedure rows per
  # Output/drgckd.pdf — "Current tobacco non-user (CAD, CAP, COPD,
  # PV) (DM) (IBD)"). Balboa uses the OMOP `observation` table for
  # the same clinical signal, which the shared ckd_common row
  # already covers. This row is DRG-only so it doesn't leak into
  # Balboa's workbook with DRG-specific wording.
  #
  # Criteria is anchored on status-style fragments (current /
  # former / never + tobacco/smoker, or "smoking status") so that
  # tobacco-counselling, tobacco-screening, and tobacco-cessation
  # procedures don't get pulled into a row that's labelled as
  # status. The "Current tobacco non-user" PDF concept matches
  # via `%tobacco%user%` (covers both "user" and "non-user").
  - category: Observations
    variable: Smoking Status (Procedure-coded)
    description: >
      Smoking status recorded as a SNOMED procedure concept —
      "Current tobacco user / non-user", "Former tobacco user", or
      an explicit "Smoking status" code. Distinct from tobacco-
      cessation, counselling, or screening procedures, which carry
      the words tobacco or smoking but record an intervention rather
      than a patient status.
    table: procedure_occurrence
    column: procedure_concept_name
    criteria: >
      procedure_concept_name ILIKE '%current tobacco%' OR
      procedure_concept_name ILIKE '%former tobacco%' OR
      procedure_concept_name ILIKE '%never%tobacco%' OR
      procedure_concept_name ILIKE '%tobacco%user%' OR
      procedure_concept_name ILIKE '%tobacco%non-user%' OR
      procedure_concept_name ILIKE '%current%smoker%' OR
      procedure_concept_name ILIKE '%former%smoker%' OR
      procedure_concept_name ILIKE '%never%smoker%' OR
      procedure_concept_name ILIKE '%smoking status%'
    inclusion_criteria: Records are included for each smoking-status SNOMED procedure recorded for the patient — current/former/never tobacco user, current/former/never smoker, or explicit smoking-status concepts. Cessation and counselling procedures (CPT 99406-99407) are excluded.
    extraction_type: Structured
    notes: >
      Parallel to the observation-side Smoking Status row. Combined
      cohort-level counts require de-duplicating by person across
      the two rows because some sites may populate both. Cessation
      and counselling procedures (e.g. CPT 99406-99407, "Smoking
      and tobacco use cessation counseling") are deliberately
      excluded — they record an intervention, not a patient status.
