# Shared ADRD (Alzheimer's Disease and Related Dementias) variable base.
#
# Used by packs/variables/alzheimers_common.yaml and
# packs/variables/aat_common.yaml via `include: [adrd_common]`. The
# disease-common packs are themselves intermediate — every cohort
# pack (e.g. mtc_alzheimers.yaml, mtc_aat.yaml) layers on top of its
# disease-common base, so the final include chain a cohort sees is:
#
#   <cohort>  →  <disease>_common  →  adrd_common
#
# Covers everything a neurodegenerative-disease cohort dictionary
# needs that is not disease-specific:
#
#   Demographics, Vitals, Observations, Diagnosis, Biomarkers/Labs,
#   Visits, Outcomes, Reports.
#
# Disease-common packs add rows on top (Alzheimer's-era medications,
# anti-amyloid therapy, ARIA-H/ARIA-E, etc.). Per-cohort packs add
# cohort-specific rows on top of those (no MTC examples today; would
# apply to a future RMN Alzheimer's curated abstraction). Keep this
# file narrow — anything that isn't equally meaningful across every
# ADRD cohort belongs in the disease-common pack, and anything that
# exists in only one cohort's ETL belongs in the per-cohort pack.

variables:
  # ----- Demographics -------------------------------------------------
  - category: Demographics
    variable: Ethnicity
    description: The patient's self-identified ethnicity, distinguishing Hispanic or Latino origin.
    table: person
    column: ethnicity_concept_name
    extraction_type: Structured
    notes: Ethnicity is not reliably recorded at many sites; assessing ways to infer.

  - category: Demographics
    variable: Race
    description: The patient's self-identified racial category.
    table: person
    column: race_concept_name
    extraction_type: Structured
    notes: Race is not reliably recorded at many sites.

  - category: Demographics
    variable: Sex
    description: The patient's biological sex at birth.
    table: person
    column: gender_concept_name
    extraction_type: Structured

  - category: Demographics
    variable: Birth Year
    description: Year the patient was born. Used for age calculation.
    table: person
    column: year_of_birth
    extraction_type: Structured

  - category: Demographics
    variable: ZIP code (3-digit prefix)
    description: >
      First three digits of the patient ZIP code — HIPAA Safe Harbor
      "large geographic area" generalisation.
    table: location
    column: zip
    expression: LEFT("zip"::text, 3)
    extraction_type: Structured
    # Internal: PII-filtered for sales / pharma audiences. The 3-digit
    # prefix is the HIPAA Safe Harbor "large geographic area"
    # generalisation — small enough on its own to be safe, but treated
    # as restricted because it is still address-derived.
    notes: Restricted demographic field; available only to authorised technical reviewers.

  # NOTE: Payer Type is intentionally NOT included here. MTC warehouses
  # ship `payer_plan_period` and want the row; RMN Alzheimer's does
  # not, so inheriting the row from this shared base would throw
  # "relation does not exist" warnings on every RMN build. The MTC
  # per-cohort packs (mtc_aat.yaml, mtc_alzheimers.yaml) own the row
  # directly; a future ADRD cohort that ships payer data can pick it
  # up the same way.

  - category: Demographics
    variable: Language
    description: Primary language of the patient.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%language%'
    extraction_type: Structured

  - category: Demographics
    variable: Marital Status
    description: Marital status of the patient.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%marital status%'
    extraction_type: Structured

  - category: Demographics
    variable: Sexual Orientation
    description: Sexual orientation of the patient.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%sexual orientation%'
    extraction_type: Structured

  # ----- Vitals -------------------------------------------------------
  - category: Vitals
    variable: Blood Pressure
    description: Sitting blood pressure values taken at the office visit.
    table: observation
    column: value_as_string
    criteria: observation_concept_name ILIKE '%blood pressure%'
    extraction_type: Structured

  - category: Vitals
    variable: Temperature
    description: Patient temperature taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%temperature%'
    extraction_type: Structured

  - category: Vitals
    variable: Heart Rate
    description: Patient heart rate taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%heart rate%'
    extraction_type: Structured

  - category: Vitals
    variable: Oxygen Saturation
    description: Peripheral oxygen saturation percentage.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%O2 saturation%' OR observation_concept_name ILIKE '%oxygen saturation%'
    inclusion_criteria: Records where the observation captures a Oxygen Saturation value.
    extraction_type: Structured

  - category: Vitals
    variable: Body Weight
    description: Patient weight taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%body weight%' OR observation_concept_name ILIKE '%weight%'
    inclusion_criteria: Records where the observation captures a Body Weight value.
    extraction_type: Structured

  - category: Vitals
    variable: Patient Height
    description: Patient height recorded at the office visit.
    table: observation
    column: value_as_string
    criteria: observation_concept_name ILIKE '%height%'
    extraction_type: Structured

  - category: Vitals
    variable: Respiratory Rate
    description: Patient respiratory rate taken at the office visit.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%respiratory rate%'
    extraction_type: Structured

  # ----- Observations -------------------------------------------------
  - category: Observations
    variable: Allergies
    description: Observation of patient allergies.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%allerg%'
    extraction_type: Structured

  # ----- Diagnosis ----------------------------------------------------
  - category: Diagnosis
    variable: Diagnosis
    description: Medical diagnoses and conditions recorded for the patient.
    table: condition_occurrence
    column: condition_concept_name
    extraction_type: Structured

  - category: Diagnosis
    variable: Diagnosis Type
    description: Source from which the diagnosis was captured.
    table: condition_occurrence
    column: condition_type_concept_name
    extraction_type: Structured

  - category: Diagnosis
    variable: Diagnosis Start Date
    description: Date the condition was first recorded.
    table: condition_occurrence
    column: condition_start_date
    extraction_type: Structured

  # ----- Diagnosis — ADRD-specific ---------------------------------
  # Umbrella row capturing the cognitive-impairment concept family
  # that defines ADRD cohorts: Alzheimer's disease variants, mild
  # cognitive impairment (MCI), amnesia, memory impairment, and
  # other dementias. Lives here (not in alzheimers_common or
  # aat_common) because anti-amyloid-therapy patients carry these
  # diagnoses too — AAT is administered on the basis of an
  # Alzheimer's diagnosis.
  - category: Diagnosis
    variable: Alzheimer's / Cognitive Impairment Diagnosis
    description: >
      Alzheimer's disease, mild cognitive impairment (MCI), amnesia,
      memory impairment, dementia, and related cognitive-function
      diagnoses recorded for the patient. Covers all Alzheimer's
      onset variants and the broader dementia family.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%Alzheimer%' OR
      condition_concept_name ILIKE '%mild cognitive impairment%' OR
      condition_concept_name ILIKE '%MCI%' OR
      condition_concept_name ILIKE '%amnesia%' OR
      condition_concept_name ILIKE '%memory impairment%' OR
      condition_concept_name ILIKE '%dementia%' OR
      condition_concept_name ILIKE '%cognitive function%' OR
      condition_concept_name ILIKE '%cognitive decline%' OR
      condition_concept_name ILIKE '%cognitive impairment%'
    inclusion_criteria: Records where the diagnosis concept matches the Alzheimer's / Cognitive Impairment Diagnosis family.
    extraction_type: Structured
    # Internal: broad on purpose — many related SNOMED strings sit
    # under this umbrella. To split Alzheimer's vs MCI vs dementia-
    # other, add a narrower row in a per-cohort pack rather than
    # tightening this one.
    notes: Umbrella diagnosis. Combine with biomarker rows (amyloid-beta, p-Tau) for clinically confirmed Alzheimer's subsets.

  # ----- Labs / Biomarkers -------------------------------------------
  # Category label matches packs/categories.yaml exactly ("Labs /
  # Biomarkers"). Earlier packs used "Biomarkers / Labs" — pinned to
  # the categories.yaml spelling so Columns and Variables pages line
  # up in print.
  - category: Labs / Biomarkers
    variable: APOE Genotype
    description: APOE allele status from genotyping.
    table: measurement
    column: value_as_concept_name
    criteria: measurement_concept_name ILIKE '%APOE%' OR measurement_concept_name ILIKE '%apolipoprotein%'
    inclusion_criteria: Records where the measurement is for APOE Genotype.
    extraction_type: Structured
    notes: Key inclusion/exclusion variable for anti-amyloid therapy eligibility.

  - category: Labs / Biomarkers
    variable: Amyloid-beta 42 (A-beta 42)
    description: Measures amyloid-beta 42 peptide in plasma or CSF.
    table: measurement
    column: value_as_number
    # Explicit name variants only — no `%A%42%` style wildcards,
    # which would match any measurement whose name happens to
    # contain an A before 42 (e.g. "ALT pre-42", "HbA1c 42").
    criteria: >
      measurement_concept_name ILIKE '%amyloid beta 42%' OR
      measurement_concept_name ILIKE '%amyloid-beta 42%' OR
      measurement_concept_name ILIKE '%amyloid beta-42%' OR
      measurement_concept_name ILIKE '%amyloid-beta-42%' OR
      measurement_concept_name ILIKE '%Abeta42%' OR
      measurement_concept_name ILIKE '%Abeta 42%' OR
      measurement_concept_name ILIKE '%A-beta 42%' OR
      measurement_concept_name ILIKE '%A beta 42%' OR
      measurement_concept_name ILIKE '%AB 42%' OR
      measurement_concept_name ILIKE '%AB42%' OR
      measurement_concept_name ILIKE '%Aβ42%' OR
      measurement_concept_name ILIKE '%Aβ 42%' OR
      measurement_concept_name ILIKE '%β-amyloid 42%'
    inclusion_criteria: Records where the measurement is for Amyloid-beta 42 (A-beta 42).
    extraction_type: Structured

  - category: Labs / Biomarkers
    variable: Amyloid-beta 40 (A-beta 40)
    description: Measures amyloid-beta 40 peptide.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%amyloid beta 40%' OR
      measurement_concept_name ILIKE '%amyloid-beta 40%' OR
      measurement_concept_name ILIKE '%amyloid beta-40%' OR
      measurement_concept_name ILIKE '%amyloid-beta-40%' OR
      measurement_concept_name ILIKE '%Abeta40%' OR
      measurement_concept_name ILIKE '%Abeta 40%' OR
      measurement_concept_name ILIKE '%A-beta 40%' OR
      measurement_concept_name ILIKE '%A beta 40%' OR
      measurement_concept_name ILIKE '%AB 40%' OR
      measurement_concept_name ILIKE '%AB40%' OR
      measurement_concept_name ILIKE '%Aβ40%' OR
      measurement_concept_name ILIKE '%Aβ 40%' OR
      measurement_concept_name ILIKE '%β-amyloid 40%'
    inclusion_criteria: Records where the measurement is for Amyloid-beta 40 (A-beta 40).
    extraction_type: Structured

  - category: Labs / Biomarkers
    variable: GFAP
    description: Glial fibrillary acidic protein — astrocyte activation / neuroinflammation marker.
    table: measurement
    column: value_as_number
    criteria: measurement_concept_name ILIKE '%GFAP%' OR measurement_concept_name ILIKE '%fibrillary acidic%' OR measurement_concept_name ILIKE '%glial fibrillary%'
    inclusion_criteria: Records where the measurement is for GFAP.
    extraction_type: Structured

  - category: Labs / Biomarkers
    variable: p-Tau-181
    description: Phosphorylated tau at position 181 — Alzheimer's biomarker.
    table: measurement
    column: value_as_number
    criteria: measurement_concept_name ILIKE '%pTau-181%' OR measurement_concept_name ILIKE '%p-Tau 181%' OR measurement_concept_name ILIKE '%phosphorylated tau%181%'
    inclusion_criteria: Records where the measurement is for p-Tau-181.
    extraction_type: Structured

  - category: Labs / Biomarkers
    variable: p-Tau-217
    description: Phosphorylated tau at position 217 — Alzheimer's biomarker.
    table: measurement
    column: value_as_number
    criteria: measurement_concept_name ILIKE '%pTau-217%' OR measurement_concept_name ILIKE '%p-Tau 217%' OR measurement_concept_name ILIKE '%phosphorylated tau%217%'
    inclusion_criteria: Records where the measurement is for p-Tau-217.
    extraction_type: Structured

  - category: Labs / Biomarkers
    variable: Neurofilament Light Chain (NfL)
    description: NfL in blood — axonal injury / neurodegeneration marker.
    table: measurement
    column: value_as_number
    criteria: measurement_concept_name ILIKE '%neurofilament%' OR measurement_concept_name ILIKE '%NfL%'
    inclusion_criteria: Records where the measurement is for Neurofilament Light Chain (NfL).
    extraction_type: Structured

  # ----- Visits -------------------------------------------------------
  - category: Visits
    variable: Visit Type
    description: Type of healthcare visit or encounter.
    table: visit_occurrence
    column: visit_concept_name
    extraction_type: Structured

  - category: Visits
    variable: Visit Date
    description: Start date of each visit.
    table: visit_occurrence
    column: visit_start_date
    extraction_type: Structured

  # ----- Outcomes (cognitive assessments — abstracted) ---------------
  - category: Outcomes
    variable: MoCA
    description: Montreal Cognitive Assessment — brief screening test for cognitive dysfunction.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%MoCA%' OR observation_concept_name ILIKE '%Montreal Cognitive%'
    inclusion_criteria: Records where the abstracted concept captures MoCA for the patient.
    extraction_type: Abstracted
    notes: Estimates based on NLP of clinical text with manual validation.

  - category: Outcomes
    variable: MMSE
    description: Mini-Mental State Examination — short cognitive test.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%MMSE%' OR observation_concept_name ILIKE '%Mini-Mental%'
    inclusion_criteria: Records where the abstracted concept captures MMSE for the patient.
    extraction_type: Abstracted

  - category: Outcomes
    variable: FAQ
    description: Functional Activities Questionnaire — informant-based functional ability.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%FAQ%' OR observation_concept_name ILIKE '%Functional Activities%'
    inclusion_criteria: Records where the abstracted concept captures FAQ for the patient.
    extraction_type: Abstracted

  - category: Outcomes
    variable: CDR
    description: Clinical Dementia Rating — clinician-rated severity scale.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%CDR%' OR observation_concept_name ILIKE '%Clinical Dementia Rating%'
    inclusion_criteria: Records where the abstracted concept captures CDR for the patient.
    extraction_type: Abstracted

  - category: Outcomes
    variable: ADL
    description: Activities of daily living — whether the patient can perform self-care tasks independently.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%ADL%' OR observation_concept_name ILIKE '%activities of daily living%'
    inclusion_criteria: Records where the observation concept matches ADL.
    extraction_type: Structured

  - category: Outcomes
    variable: Dementia Severity Rating Scale
    description: 12-item informant-based questionnaire assessing dementia severity.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%Dementia Severity Rating%' OR observation_concept_name ILIKE '%DSRS%'
    inclusion_criteria: Records where the abstracted concept captures Dementia Severity Rating Scale for the patient.
    extraction_type: Abstracted

  - category: Outcomes
    variable: ADAS-Cog
    description: Alzheimer's Disease Assessment Scale — Cognitive subscale.
    table: observation
    column: value_as_number
    criteria: observation_concept_name ILIKE '%ADAS-Cog%' OR observation_concept_name ILIKE '%ADAS Cog%'
    inclusion_criteria: Records where the abstracted concept captures ADAS-Cog for the patient.
    extraction_type: Abstracted

  # ----- Reports ------------------------------------------------------
  - category: Reports
    variable: Clinical Note
    description: Free text of the office-visit clinical note.
    table: note
    column: note_text
    extraction_type: Unstructured

  - category: Reports
    variable: Document (MRI / PET / EEG)
    description: Scanned or attached report documents — MRI, PET, EEG and related imaging reports.
    table: document
    column: document_type_concept_name
    # Restrict to imaging / brain-report document types so the variable
    # name stays honest. Without this criteria the row would summarise
    # every document type including rooming charts and lab printouts.
    criteria: >
      document_type_concept_name ILIKE '%MRI%' OR
      document_type_concept_name ILIKE '%PET%' OR
      document_type_concept_name ILIKE '%EEG%' OR
      document_type_concept_name ILIKE '%imaging%' OR
      document_type_concept_name ILIKE '%CT%' OR
      document_type_concept_name ILIKE '%neuroimaging%'
    inclusion_criteria: Records where the document type matches a Document (MRI / PET / EEG) report.
    extraction_type: Unstructured

  - category: Reports
    variable: PET Scan Result
    description: Indication of positive / negative PET scan result.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%PET%scan%result%' OR observation_concept_name ILIKE '%amyloid PET%'
    inclusion_criteria: Records where the abstracted concept captures PET Scan Result for the patient.
    extraction_type: Abstracted
