# Alzheimer's-specific variable pack.
#
# Inherits the shared ADRD common base and adds rows that are
# meaningful for the general Alzheimer's / dementia cohort but not
# for the anti-amyloid-therapy (AAT) subset:
#
#   - generic symptomatic medications (donepezil, rivastigmine,
#     memantine) and route
#   - generic ARIA observation (no microhemorrhage / edema split —
#     that level of detail lives in aat.yaml)
#
# Anti-amyloid infusion therapy, ARIA-H, and ARIA-E rows live in
# aat.yaml because they only apply to the on-therapy subset.

include:
  - adrd_common

variables:
  # ----- Medications (symptomatic ADRD therapy) ----------------------
  # Rows are scoped to the approved Alzheimer's symptomatic
  # pharmacopoeia — cholinesterase inhibitors (donepezil / rivastigmine
  # / galantamine), NMDA antagonist (memantine) and combos (e.g. the
  # Namzaric donepezil+memantine combo). This keeps the Description
  # honest — without these filters the rows summarised every single
  # medication in drug_exposure (statins, aspirin, PPIs, etc.), which
  # isn't what a "Symptomatic ADRD Therapy" row should report.
  - category: Medications
    variable: Symptomatic ADRD Therapy (Prescription)
    description: >
      Prescribed symptomatic Alzheimer's therapies — cholinesterase
      inhibitors (donepezil, rivastigmine, galantamine), NMDA antagonist
      (memantine), and ChEI+memantine combinations.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      (drug_type_concept_name ILIKE '%prescription%') AND
      (drug_concept_name ILIKE '%donepezil%' OR
       drug_concept_name ILIKE '%Aricept%' OR
       drug_concept_name ILIKE '%rivastigmine%' OR
       drug_concept_name ILIKE '%Exelon%' OR
       drug_concept_name ILIKE '%galantamine%' OR
       drug_concept_name ILIKE '%Razadyne%' OR
       drug_concept_name ILIKE '%memantine%' OR
       drug_concept_name ILIKE '%Namenda%' OR
       drug_concept_name ILIKE '%Namzaric%')
    extraction_type: Structured

  - category: Medications
    variable: Symptomatic ADRD Therapy (Administration)
    description: >
      Administered symptomatic Alzheimer's therapies — cholinesterase
      inhibitors, NMDA antagonist, and combinations.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      (drug_type_concept_name ILIKE '%administration%') AND
      (drug_concept_name ILIKE '%donepezil%' OR
       drug_concept_name ILIKE '%Aricept%' OR
       drug_concept_name ILIKE '%rivastigmine%' OR
       drug_concept_name ILIKE '%Exelon%' OR
       drug_concept_name ILIKE '%galantamine%' OR
       drug_concept_name ILIKE '%Razadyne%' OR
       drug_concept_name ILIKE '%memantine%' OR
       drug_concept_name ILIKE '%Namenda%' OR
       drug_concept_name ILIKE '%Namzaric%')
    extraction_type: Structured

  - category: Medications
    variable: Symptomatic ADRD Therapy (Route)
    description: >
      Route of administration for symptomatic Alzheimer's therapies
      (transdermal rivastigmine vs oral ChEI / NMDA).
    table: drug_exposure
    column: route_concept_name
    # Scope to the ADRD drug set rather than every drug_exposure row.
    criteria: >
      drug_concept_name ILIKE '%donepezil%' OR
      drug_concept_name ILIKE '%rivastigmine%' OR
      drug_concept_name ILIKE '%galantamine%' OR
      drug_concept_name ILIKE '%memantine%' OR
      drug_concept_name ILIKE '%Aricept%' OR
      drug_concept_name ILIKE '%Exelon%' OR
      drug_concept_name ILIKE '%Razadyne%' OR
      drug_concept_name ILIKE '%Namenda%' OR
      drug_concept_name ILIKE '%Namzaric%'
    extraction_type: Structured

  # ----- Outcomes ----------------------------------------------------
  # Generic ARIA observation — AAT cohorts get a more specific split
  # in aat.yaml (ARIA-H microhemorrhage / ARIA-E edema). Matches
  # anywhere in the concept name (`%ARIA%`) so warehouses that store
  # labels like "MRI finding - ARIA-H" or "Amyloid-related imaging
  # abnormality ARIA-E" aren't missed.
  - category: Outcomes
    variable: ARIA
    description: Amyloid-related imaging abnormality — indicator of amyloid-therapy safety events.
    table: observation
    column: value_as_concept_name
    criteria: observation_concept_name ILIKE '%ARIA%'
    extraction_type: Structured
    notes: ARIA-H (microhemorrhage) and ARIA-E (edema) split out in aat.yaml.
