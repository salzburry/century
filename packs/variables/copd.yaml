# COPD (Chronic Obstructive Pulmonary Disease) variable pack.
#
# Inherits the shared respiratory base (demographics, vitals, smoking
# status, spirometry/PFT procedure, eosinophils, visits, reports) and
# adds the COPD-specific rows:
#
#   - COPD diagnosis (incl. emphysema / chronic bronchitis variants)
#   - exacerbation marker (abstracted — cohort definition varies)
#   - inhaler classes (SABA, LABA, LAMA, ICS) plus triple therapy
#   - systemic corticosteroids (exacerbation treatment)
#   - long-term supplemental oxygen
#   - FEV1 / FVC / FEV1-FVC ratio (abstracted — pending for Nimbus AZ)
#   - CAT score (abstracted patient-reported outcome)
#
# Deliberately does NOT include the asthma pack. Biologics, ICS/LABA
# combinations intended for asthma, and FeNO / IgE all live in
# asthma.yaml because their interpretation differs in COPD.

include:
  - respiratory_common

variables:
  # ----- Diagnosis — COPD-specific ----------------------------------
  # Narrow to the three standard COPD condition families. The generic
  # "Diagnosis" row from respiratory_common captures every condition;
  # this row exists so reviewers can see cohort-defining prevalence
  # without scanning thousands of unrelated conditions.
  - category: Diagnosis
    variable: COPD Diagnosis
    description: >
      Chronic obstructive pulmonary disease diagnosis — includes
      emphysema, chronic bronchitis, and unspecified COPD variants.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      condition_concept_name ILIKE '%chronic obstructive pulmonary%' OR
      condition_concept_name ILIKE '%COPD%' OR
      condition_concept_name ILIKE '%emphysema%' OR
      condition_concept_name ILIKE '%chronic bronchitis%' OR
      condition_concept_name ILIKE '%chronic obstructive airway%'
    extraction_type: Structured
    notes: Cohort-defining diagnosis for Nimbus COPD and Nimbus AZ COPD.

  # ----- Medications — inhaled bronchodilators / anti-inflammatories -
  # Rows split by pharmacologic class so the Variables sheet shows
  # class-level coverage instead of every branded inhaler. Criteria
  # filter drug_concept_name on the FDA-approved active ingredient
  # names so branded labels (e.g. ProAir, Trelegy) still match through
  # the ingredient substring. Short-acting agents on one row; long-
  # acting agents on a second row; ICS and triple-therapy combinations
  # on dedicated rows below.
  - category: Medications
    variable: Short-acting Bronchodilator (SABA / SAMA)
    description: >
      Short-acting beta-agonists (albuterol / levalbuterol) and
      short-acting muscarinic antagonists (ipratropium) — rescue
      inhalers and nebuliser solutions.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%albuterol%' OR
      drug_concept_name ILIKE '%salbutamol%' OR
      drug_concept_name ILIKE '%levalbuterol%' OR
      drug_concept_name ILIKE '%ipratropium%' OR
      drug_concept_name ILIKE '%Xopenex%' OR
      drug_concept_name ILIKE '%ProAir%' OR
      drug_concept_name ILIKE '%Ventolin%' OR
      drug_concept_name ILIKE '%Proventil%' OR
      drug_concept_name ILIKE '%Atrovent%' OR
      drug_concept_name ILIKE '%Combivent%'
    extraction_type: Structured

  - category: Medications
    variable: Long-acting Beta-agonist (LABA)
    description: >
      Long-acting beta-agonists — salmeterol, formoterol, olodaterol,
      indacaterol, vilanterol. Captured as mono-LABA plus any
      combination product containing a LABA ingredient.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%salmeterol%' OR
      drug_concept_name ILIKE '%formoterol%' OR
      drug_concept_name ILIKE '%olodaterol%' OR
      drug_concept_name ILIKE '%indacaterol%' OR
      drug_concept_name ILIKE '%vilanterol%' OR
      drug_concept_name ILIKE '%arformoterol%'
    extraction_type: Structured

  - category: Medications
    variable: Long-acting Muscarinic Antagonist (LAMA)
    description: >
      Long-acting muscarinic antagonists — tiotropium, umeclidinium,
      aclidinium, glycopyrrolate (inhaled), revefenacin.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%tiotropium%' OR
      drug_concept_name ILIKE '%umeclidinium%' OR
      drug_concept_name ILIKE '%aclidinium%' OR
      drug_concept_name ILIKE '%revefenacin%' OR
      (drug_concept_name ILIKE '%glycopyrrolate%' AND
       drug_concept_name ILIKE '%inhal%') OR
      drug_concept_name ILIKE '%Spiriva%' OR
      drug_concept_name ILIKE '%Incruse%' OR
      drug_concept_name ILIKE '%Tudorza%'
    extraction_type: Structured
    notes: >
      Glycopyrrolate row is scoped to inhaled formulations — the
      oral/injectable formulations are used for secretion management
      and are not a COPD maintenance therapy.

  - category: Medications
    variable: Inhaled Corticosteroid (ICS)
    description: >
      Inhaled corticosteroids — fluticasone, budesonide, beclomethasone,
      mometasone, ciclesonide. Captured as mono-ICS plus combination
      products containing an ICS ingredient.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%fluticasone%' OR
      drug_concept_name ILIKE '%budesonide%' OR
      drug_concept_name ILIKE '%beclomethasone%' OR
      drug_concept_name ILIKE '%mometasone%' OR
      drug_concept_name ILIKE '%ciclesonide%'
    extraction_type: Structured

  - category: Medications
    variable: COPD Triple Therapy (ICS + LABA + LAMA)
    description: >
      Single-inhaler triple therapy — fluticasone / umeclidinium /
      vilanterol (Trelegy); budesonide / glycopyrrolate / formoterol
      (Breztri). Cross-cuts the ICS / LABA / LAMA rows above; reviewer
      should not double-count patients across rows.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%Trelegy%' OR
      drug_concept_name ILIKE '%Breztri%' OR
      (drug_concept_name ILIKE '%fluticasone%' AND
       drug_concept_name ILIKE '%umeclidinium%' AND
       drug_concept_name ILIKE '%vilanterol%') OR
      (drug_concept_name ILIKE '%budesonide%' AND
       drug_concept_name ILIKE '%glycopyrrolate%' AND
       drug_concept_name ILIKE '%formoterol%')
    extraction_type: Structured

  - category: Medications
    variable: Systemic Corticosteroid (Oral / IV)
    description: >
      Systemic corticosteroid courses — prednisone, prednisolone,
      methylprednisolone, dexamethasone. Proxy for COPD exacerbation
      treatment when paired with an exacerbation diagnosis.
    table: drug_exposure
    column: drug_concept_name
    criteria: >
      drug_concept_name ILIKE '%prednisone%' OR
      drug_concept_name ILIKE '%prednisolone%' OR
      drug_concept_name ILIKE '%methylprednisolone%' OR
      drug_concept_name ILIKE '%dexamethasone%'
    extraction_type: Structured
    notes: >
      Row captures all systemic steroid exposures; COPD-specific
      exacerbation attribution requires a temporal join with the
      COPD Exacerbation diagnosis row.

  - category: Medications
    variable: Phosphodiesterase-4 Inhibitor (Roflumilast)
    description: Oral PDE4 inhibitor roflumilast — add-on therapy for severe chronic-bronchitis-predominant COPD.
    table: drug_exposure
    column: drug_concept_name
    criteria: drug_concept_name ILIKE '%roflumilast%' OR drug_concept_name ILIKE '%Daliresp%'
    extraction_type: Structured

  # ----- Procedures — oxygen and NIV --------------------------------
  - category: Procedures
    variable: Supplemental Oxygen Therapy
    description: >
      Long-term oxygen therapy (LTOT) or in-clinic oxygen administration
      — procedure codes and HCPCS device codes for oxygen delivery.
    table: procedure_occurrence
    column: procedure_concept_name
    criteria: >
      procedure_concept_name ILIKE '%oxygen therapy%' OR
      procedure_concept_name ILIKE '%supplemental oxygen%' OR
      procedure_concept_name ILIKE '%home oxygen%' OR
      procedure_concept_name ILIKE '%oxygen administration%' OR
      procedure_concept_name ILIKE '%long-term oxygen%'
    extraction_type: Structured
    notes: >
      TODO (clinical review): DME claims often carry oxygen via HCPCS
      E-codes (E0424, E1390) that map to different concept names.
      Widen criteria to include those codes if Implemented=No.

  # ----- Labs / Biomarkers — pulmonary function ---------------------
  # FEV1 / FVC / ratio are curated as Labs/Biomarkers (their raw home
  # is the measurement table). The README flags these as abstracted-
  # variables-in-progress for Nimbus AZ, so we ship them as Abstracted
  # and accept Implemented=No until the chart-review pipeline lands.
  #
  # Blood eosinophils come from the shared respiratory_common row
  # (measurement table). The Nimbus COPD curated cohort also ships a
  # dedicated `eosinophil_standardized` abstraction table, mirrored as
  # a second row below so Nimbus COPD surfaces its curated data while
  # sites that record eosinophils as lab measurements still hit the
  # respiratory_common row.
  - category: Labs / Biomarkers
    variable: Blood Eosinophils (Standardized, Nimbus curated)
    description: >
      Absolute blood eosinophil count from the Nimbus curated
      abstraction pipeline. Parallel to the shared "Blood Eosinophils"
      row — this one points at the dedicated `eosinophil_standardized`
      table that the Nimbus COPD curated cohort ships instead of raw
      measurement rows.
    table: eosinophil_standardized
    column: value_as_number
    extraction_type: Structured
    notes: >
      Table is Nimbus-COPD-curated-only (confirmed in
      Output/minbuscopdcurated.pdf). Nimbus AZ COPD will show
      Implemented=No because its schema does not ship this
      abstracted table; that's the expected shape, not a bug. Kept
      alongside the measurement-table row rather than replacing it
      so sites recording eosinophils as ordinary lab measurements
      still surface a hit.

  - category: Labs / Biomarkers
    variable: FEV1 (Forced Expiratory Volume in 1 second)
    description: >
      FEV1 — volume of air exhaled in the first second of a forced
      exhalation. Primary COPD severity marker (GOLD staging).
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%FEV1%' OR
      measurement_concept_name ILIKE '%FEV 1%' OR
      measurement_concept_name ILIKE '%forced expiratory volume%1%' OR
      measurement_concept_name ILIKE '%forced expir%1 second%'
    extraction_type: Abstracted
    notes: >
      Per README §2.1, Nimbus AZ COPD has FEV1 abstraction in progress;
      Nimbus COPD curated may or may not populate this row. Expect
      Implemented=No at most sites until the abstraction pipeline lands.

  - category: Labs / Biomarkers
    variable: FVC (Forced Vital Capacity)
    description: Total volume of air exhaled during a forced vital capacity maneuver.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%FVC%' OR
      measurement_concept_name ILIKE '%forced vital capacity%'
    extraction_type: Abstracted

  - category: Labs / Biomarkers
    variable: FEV1 / FVC Ratio
    description: >
      Post-bronchodilator FEV1/FVC ratio — airflow-obstruction
      confirmation. Ratio < 0.70 confirms a COPD diagnosis per GOLD.
    table: measurement
    column: value_as_number
    criteria: >
      measurement_concept_name ILIKE '%FEV1%FVC%' OR
      measurement_concept_name ILIKE '%FEV1/FVC%' OR
      measurement_concept_name ILIKE '%FEV 1%FVC%'
    extraction_type: Abstracted

  # ----- Outcomes - exacerbations and patient-reported outcomes -----
  - category: Outcomes
    variable: COPD Exacerbation (Abstracted)
    description: >
      Acute COPD exacerbation event — typically captured by a visit
      with an acute-exacerbation diagnosis plus systemic steroid /
      antibiotic course. Row here reports the condition-side
      attribution; a full algorithmic definition is cohort-specific.
    table: condition_occurrence
    column: condition_concept_name
    criteria: >
      (condition_concept_name ILIKE '%acute exacerbation%' AND
       (condition_concept_name ILIKE '%obstructive%' OR
        condition_concept_name ILIKE '%bronchitis%' OR
        condition_concept_name ILIKE '%COPD%' OR
        condition_concept_name ILIKE '%emphysema%'))
    extraction_type: Abstracted
    notes: >
      TODO (clinical review): confirm the exacerbation definition for
      this cohort (condition-only vs visit-type + dx + steroid
      course). Current criteria is narrow to avoid matching unrelated
      exacerbations (e.g. CHF exacerbation).

  - category: Outcomes
    variable: CAT Score (COPD Assessment Test)
    description: >
      8-item patient-reported outcome (0–40) quantifying COPD symptom
      burden. Common trigger for therapy escalation at CAT >= 10.
    table: observation
    column: value_as_number
    criteria: >
      observation_concept_name ILIKE '%COPD Assessment Test%' OR
      observation_concept_name ILIKE '%CAT score%' OR
      observation_concept_name ILIKE '%CAT total%'
    extraction_type: Abstracted
    notes: >
      TODO (clinical review): CAT is often captured as a scanned
      questionnaire rather than a structured observation. Expect
      Implemented=No unless a dedicated CAT abstraction exists.

  - category: Outcomes
    variable: mMRC Dyspnea Scale
    description: >
      Modified Medical Research Council dyspnea scale (0–4) — breathlessness
      severity; paired with CAT score for GOLD A/B/E group assignment.
    table: observation
    column: value_as_number
    criteria: >
      observation_concept_name ILIKE '%mMRC%' OR
      observation_concept_name ILIKE '%Modified Medical Research Council%' OR
      observation_concept_name ILIKE '%MRC dyspnea%'
    extraction_type: Abstracted
    notes: TODO (clinical review) — mMRC typically lives in clinical notes rather than structured observations.
