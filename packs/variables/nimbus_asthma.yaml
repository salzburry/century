# Nimbus Asthma — final variables pack.
#
# Cohort-specific source of truth for packs/cohorts/nimbus_asthma.yaml.
# Inherits every asthma-level row from asthma_common (which in turn
# includes respiratory_common). Does NOT currently add any cohort-
# specific rows — the Nimbus Asthma curated ETL does not ship an
# abstraction table analogous to Nimbus COPD's `eosinophil_standardized`,
# and no variable divergence from asthma_common has been confirmed yet.
#
# Populate this file when:
#   - The Nimbus Asthma curated ETL starts emitting cohort-specific
#     tables (e.g. an `ige_standardized` or `act_standardized`)
#   - A concept-name pattern diverges from asthma_common in this
#     cohort only and a live build confirms it
#
# Until then, this pack is a structural placeholder — every row comes
# from the shared asthma_common / respiratory_common chain.

include:
  - asthma_common

variables: []
